name: Build Gacrux Engines

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create or update GitHub Release'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      platforms:
        description: 'Platforms to build (comma-separated, leave empty for all)'
        required: false
        default: ''
        type: string
  push:
    branches:
      - engines-update

jobs:
  select-platforms:
    name: Select platforms to build
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.filter.outputs.platforms }}
    steps:
      - name: Filter platforms
        id: filter
        run: |
          # Get input platforms (comma-separated)
          INPUT_PLATFORMS="${{ github.event.inputs.platforms }}"
          
          # Default: build all platforms
          ALL_PLATFORMS="macos-arm64,macos-x64,linux-arm64,linux-x64,windows-arm64,windows-x64"
          
          # If input is empty (push event or default), build all
          if [[ -z "$INPUT_PLATFORMS" ]]; then
            echo "platforms=$ALL_PLATFORMS" >> $GITHUB_OUTPUT
            echo "Building all platforms"
            exit 0
          fi
          
          # Validate input platforms
          VALID_PLATFORMS=$ALL_PLATFORMS
          for platform in $(echo "$INPUT_PLATFORMS" | tr ',' ' '); do
            if [[ ! ",$VALID_PLATFORMS," =~ ",$platform," ]]; then
              echo "Error: Invalid platform '$platform'. Valid options: $VALID_PLATFORMS"
              exit 1
            fi
          done
          
          # Return the filtered list
          echo "platforms=$INPUT_PLATFORMS" >> $GITHUB_OUTPUT
          echo "Building platforms: $INPUT_PLATFORMS"

  build:
    name: Build Engines - ${{ matrix.platform }}
    needs: select-platforms
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            os: macos-latest
            arch: arm64
          - platform: macos-x64
            os: macos-26-intel
            arch: x64
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            arch: arm64
          - platform: linux-x64
            os: ubuntu-latest
            arch: x64
          - platform: windows-arm64
            os: windows-11-arm
            arch: arm64
          - platform: windows-x64
            os: windows-latest
            arch: x64

    steps:
      - name: Check if platform should be built
        id: check-platform
        shell: bash
        run: |
          PLATFORMS="${{ needs.select-platforms.outputs.platforms }}"
          if echo "$PLATFORMS" | grep -q "${{ matrix.platform }}"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check-platform.outputs.should_build == 'true'
        uses: actions/checkout@v4

      - name: Setup Python (macOS/Windows)
        if: steps.check-platform.outputs.should_build == 'true' && !startsWith(matrix.platform, 'linux')
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          architecture: ${{ matrix.arch }}

      - name: Build in container (Linux)
        if: steps.check-platform.outputs.should_build == 'true' && startsWith(matrix.platform, 'linux')
        uses: addnab/docker-run-action@v3
        with:
          image: python:3.12-bullseye
          options: -v ${{ github.workspace }}:/github/workspace
          shell: bash
          run: |
            set -euo pipefail

            apt-get update -qq
            apt-get install -y -qq git binutils

            cd /github/workspace
            chmod +x scripts/build-gacrux.sh
            ./scripts/build-gacrux.sh --output-dir ./engines

      - name: Build Gacrux binaries (macOS/Windows)
        if: steps.check-platform.outputs.should_build == 'true' && !startsWith(matrix.platform, 'linux')
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          chmod +x scripts/build-gacrux.sh
          ./scripts/build-gacrux.sh --output-dir ./engines

      - name: Upload binary artifacts
        if: steps.check-platform.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-engines
          path: |
            ./engines/*
            ./engines/version-*.txt
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.create_release == 'true' || github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Verify version consistency across platforms
        id: version
        run: |
          # Find all version files
          VERSION_FILES=$(find artifacts -name "version-*.txt")
          
          # Read first version as reference
          FIRST_VERSION_FILE=$(echo "$VERSION_FILES" | head -1)
          REFERENCE_VERSION=$(cat "$FIRST_VERSION_FILE")
          echo "Reference version from $FIRST_VERSION_FILE: $REFERENCE_VERSION"
          
          # Verify all versions match
          for vf in $VERSION_FILES; do
            VERSION=$(cat "$vf")
            if [[ "$VERSION" != "$REFERENCE_VERSION" ]]; then
              echo "ERROR: Version mismatch! $vf has $VERSION but expected $REFERENCE_VERSION"
              exit 1
            else
              echo "OK: $vf has version $VERSION"
            fi
          done
          
          echo "All versions match: $REFERENCE_VERSION"
          echo "version=$REFERENCE_VERSION" >> $GITHUB_OUTPUT

      - name: Create unified distribution files
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          # Create unified version.txt for distribution
          echo "$VERSION" > version.txt
          
          # Combine all checksums into single file
          echo "# Gacrux Engine Checksums" > checksums.txt
          echo "# Version: $VERSION" >> checksums.txt
          echo "" >> checksums.txt
          for cs in artifacts/**/checksums-*.txt; do
            if [[ -f "$cs" ]]; then
              cat "$cs" >> checksums.txt
              echo "" >> checksums.txt
            fi
          done
          
          echo "Created unified version.txt and checksums.txt"
          cat version.txt
          echo "---"
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: gacrux-v${{ steps.version.outputs.version }}
          name: Gacrux Engines v${{ steps.version.outputs.version }}
          body: |
            Gacrux engine binaries for Vesus Pairings
            
            ## Version
            
            Gacrux version: **${{ steps.version.outputs.version }}**
            
            ## Binaries
            
            This release includes the following binaries for each platform:
            - **pairingchecker** - Pairing checker engine
            - **tournamentgenerator** - Tournament generator engine
            - **tiebreakchecker** - Tiebreak checker engine
            
            Available for: Linux (x64, arm64), macOS (x64, arm64), Windows (x64, arm64)
            
            ## Platforms
            
            - macOS ARM64 (Apple Silicon)
            - macOS x64 (Intel)
            - Linux ARM64
            - Linux x64
            - Windows ARM64
            - Windows x64
            
            ## Installation
            
            See [engines/distribution.md](docs/engines/distribution.md) for installation instructions.
          draft: false
          prerelease: false
          make_latest: "false"
          files: |
            version.txt
            checksums.txt
            artifacts/**/pairingchecker-*
            artifacts/**/tournamentgenerator-*
            artifacts/**/tiebreakchecker-*
          fail_on_unmatched_files: false

      - name: Generate release summary
        if: always()
        run: |
          echo "## Gacrux Engines Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Version" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Binaries" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Binaries |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS ARM64 | pairingchecker-macos-arm64, tournamentgenerator-macos-arm64, tiebreakchecker-macos-arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS x64 | pairingchecker-macos-x64, tournamentgenerator-macos-x64, tiebreakchecker-macos-x64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux ARM64 | pairingchecker-linux-arm64, tournamentgenerator-linux-arm64, tiebreakchecker-linux-arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 | pairingchecker-linux-x64, tournamentgenerator-linux-x64, tiebreakchecker-linux-x64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows ARM64 | pairingchecker-windows-arm64.exe, tournamentgenerator-windows-arm64.exe, tiebreakchecker-windows-arm64.exe |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 | pairingchecker-windows-x64.exe, tournamentgenerator-windows-x64.exe, tiebreakchecker-windows-x64.exe |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download" >> $GITHUB_STEP_SUMMARY
          echo "- [View Release on GitHub](https://github.com/${{ github.repository }}/releases/tag/gacrux-v${{ steps.version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
